<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AI Interview Assessment{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-light navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('main.index') }}">
                <i class="fas fa-video me-2"></i>
                <span>AI Interview Assessment</span>
            </a>
            <div class="d-flex align-items-center">
                <span class="badge bg-gradient rounded-pill px-3 py-2" style="background: var(--primary-gradient);">
                    <i class="fas fa-robot me-1"></i> AI Powered
                </span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="container my-5 py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    <footer class="text-center py-4">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-12">
                    <p class="mb-2">
                        <strong>&copy; 2026 AI Interview Assessment System</strong>
                    </p>
                    <p class="mb-0">
                        <small>
                            <i class="fas fa-brain text-primary"></i> Powered by MediaPipe • 
                            <i class="fas fa-microphone text-success"></i> Whisper AI • 
                            <i class="fas fa-language text-warning"></i> Sentence-BERT
                        </small>
                    </p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    
    {% block extra_js %}{% endblock %}
</body>
</html>
